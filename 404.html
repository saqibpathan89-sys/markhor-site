<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Off the trail — Markhor</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" sizes="64x64" href="assets/img/favicon-64.png">
<link rel="apple-touch-icon" href="assets/img/apple-touch-icon.png">
<meta name="theme-color" content="#0a3a27">
<link rel="stylesheet" href="assets/fonts/fonts.css">
<style>
  :root{--bone:#F5F0E6;--brass:#cda766;--emerald-deep:#0a3a27;--bone-dim:rgba(245,240,230,.7)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Hanken Grotesk',sans-serif;background:radial-gradient(circle at 50% 40%,#0e4d34,var(--emerald-deep) 70%,#04190f);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(--bone);padding:30px}
  img{height:84px;margin-bottom:30px}
  .code{font-family:'Bodoni Moda',serif;font-weight:800;font-size:clamp(56px,12vw,120px);line-height:1;letter-spacing:.04em}
  h1{font-family:'Bodoni Moda',serif;font-weight:600;font-style:italic;font-size:clamp(22px,3.4vw,32px);color:var(--brass);margin:14px 0 16px;font-weight:400}
  p{color:var(--bone-dim);max-width:42ch;margin:0 auto 34px;font-size:16px}
  a{font-family:'Hanken Grotesk',sans-serif;font-size:14px;font-weight:600;color:var(--emerald-deep);background:var(--brass);text-decoration:none;padding:14px 28px;border-radius:6px;transition:.2s;display:inline-block}
  a:hover{background:#dcb878;transform:translateY(-1px)}
</style>
</head>
<body>
  <img src="assets/img/markhor-head.png" alt="Markhor">
  <div class="code">404</div>
  <h1>You’ve wandered off the trail.</h1>
  <p>Even the markhor takes a wrong turn on the high passes. This page doesn’t exist — let’s get you back.</p>
  <a href="./">Back to Markhor</a>
</body>
</html>
